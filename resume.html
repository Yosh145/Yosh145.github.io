<!DOCTYPE html>
<html lang="en">

<!--    portfolio on a tablet         -->
<!--  by yash p. and gegel gemmani    -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="shared.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs" type="module"></script>
    <style>
        /* screen — dark for PDF viewer */
        #screen {
            background-color: #1e1e1e;
            display: flex;
            flex-direction: column;
        }

        /* status bar — dark translucent */
        #status-bar {
            color: #eaeaea;
            background-color: rgba(30, 30, 30, 0.85);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        /* toolbar */
        #toolbar {
            margin-top: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            background-color: rgba(36, 36, 36, 0.9);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        #toolbar button {
            background: none;
            border: 1px solid #555;
            color: #eee;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            transition: background-color 0.15s, border-color 0.15s;
        }

        #toolbar button:hover {
            background-color: #444;
            border-color: #777;
        }

        #toolbar button:active {
            background-color: #555;
        }

        #toolbar .separator {
            width: 1px;
            height: 24px;
            background-color: #444;
            margin: 0 4px;
        }

        #toolbar .page-info {
            color: #ccc;
            font-size: 0.8em;
            min-width: 80px;
            text-align: center;
            user-select: none;
        }

        #toolbar .download-btn {
            background-color: #007aff;
            border-color: #007aff;
            color: #fff;
            width: auto;
            padding: 0 14px;
            font-size: 0.8em;
            font-weight: 500;
            gap: 6px;
        }

        #toolbar .download-btn:hover {
            background-color: #0062cc;
            border-color: #0062cc;
        }

        /* pdf canvas area */
        #pdf-container {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            background-color: #2a2a2a;
        }

        #pdf-container canvas {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            max-width: 100%;
        }

        /* loading / error states */
        #pdf-message {
            color: #999;
            text-align: center;
            padding: 60px 20px;
            font-size: 0.95em;
        }

        #pdf-message i {
            font-size: 2.5em;
            display: block;
            margin-bottom: 16px;
            color: #555;
        }
    </style>
</head>

<body>
    <div id="tablet">
        <div id="screen">
            <div id="status-bar">
                <div class="status-left"><span id="time-display"></span></div>
                <div class="status-right">
                    <i class="fa-solid fa-wifi"></i>
                    <i class="fa-solid fa-battery-full"></i>
                </div>
            </div>

            <div id="toolbar">
                <button id="btn-prev" title="Previous page"><i class="fa-solid fa-chevron-left"></i></button>
                <span class="page-info" id="page-info">Page 1 / 1</span>
                <button id="btn-next" title="Next page"><i class="fa-solid fa-chevron-right"></i></button>
                <div class="separator"></div>
                <button id="btn-zoom-out" title="Zoom out"><i class="fa-solid fa-minus"></i></button>
                <button id="btn-zoom-in" title="Zoom in"><i class="fa-solid fa-plus"></i></button>
                <div class="separator"></div>
                <button id="btn-rotate" title="Rotate"><i class="fa-solid fa-rotate-right"></i></button>
                <div class="separator"></div>
                <a id="btn-download" href="YashPatel_Resume2026.pdf" download="YashPatel_Resume2026.pdf">
                    <button class="download-btn" title="Download resume">
                        <i class="fa-solid fa-download"></i> Download
                    </button>
                </a>
            </div>

            <div id="pdf-container">
                <div id="pdf-message">
                    <i class="fa-solid fa-file-pdf"></i>
                    Loading resume...
                </div>
                <canvas id="pdf-canvas"></canvas>
            </div>

            <div id="home-zone"></div>
            <div id="home-bar" aria-label="Home Button"></div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script type="module">
        const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.mjs';

        const PDF_PATH = 'YashPatel_Resume2026.pdf';

        let pdfDoc = null;
        let currentPage = 1;
        let currentScale = 1.5;
        let currentRotation = 0;

        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        const pageInfo = document.getElementById('page-info');
        const pdfMessage = document.getElementById('pdf-message');

        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: currentScale, rotation: currentRotation });

            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            pageInfo.textContent = `Page ${num} / ${pdfDoc.numPages}`;
        }

        async function loadPDF() {
            try {
                pdfDoc = await pdfjsLib.getDocument(PDF_PATH).promise;
                pdfMessage.style.display = 'none';
                canvas.style.display = 'block';
                await renderPage(currentPage);
            } catch (err) {
                pdfMessage.innerHTML = '<i class="fa-solid fa-file-circle-exclamation"></i>Could not load resume PDF.<br><small>Place <b>YashPatel_Resume2026.pdf</b> in the site root.</small>';
                canvas.style.display = 'none';
            }
        }

        // controls
        document.getElementById('btn-prev').addEventListener('click', () => {
            if (currentPage > 1) { currentPage--; renderPage(currentPage); }
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            if (pdfDoc && currentPage < pdfDoc.numPages) { currentPage++; renderPage(currentPage); }
        });

        document.getElementById('btn-zoom-in').addEventListener('click', () => {
            currentScale = Math.min(currentScale + 0.25, 4);
            if (pdfDoc) renderPage(currentPage);
        });

        document.getElementById('btn-zoom-out').addEventListener('click', () => {
            currentScale = Math.max(currentScale - 0.25, 0.5);
            if (pdfDoc) renderPage(currentPage);
        });

        document.getElementById('btn-rotate').addEventListener('click', () => {
            currentRotation = (currentRotation + 90) % 360;
            if (pdfDoc) renderPage(currentPage);
        });

        // hide canvas until loaded
        canvas.style.display = 'none';
        loadPDF();
    </script>
</body>

</html>
